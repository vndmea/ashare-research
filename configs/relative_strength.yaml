data:
  daily_bar_path: data/raw/daily_bars.csv
  benchmark_path: data/raw/benchmark.csv
  trading_calendar_path: data/raw/trading_calendar.csv
  universe_path: data/raw/universe.csv
  adjustment_factor_path:
  price_adjustment: none

backtest:
  start_date: "2020-01-01"
  end_date: "2024-12-31"
  initial_cash: 1000000
  commission_rate: 0.0003
  stamp_tax_rate: 0.0005
  max_names: 10
  position_sizing_method: signal_weight
  rebalance_frequency: weekly
  min_holding_days: 2
  exclude_suspended: true
  exclude_st: true
  block_limit_up_buys: true
  block_limit_down_sells: true
  min_amount: 0
  slippage_rate: 0.0001
  max_volume_participation: 0.0

strategy:
  name: relative_strength
  lookback_window: 20
  min_positive_return: 0.0

report:
  output_dir: reports/relative_strength_run
